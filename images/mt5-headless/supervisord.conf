[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:xvfb]
command=Xvfb :1 -screen 0 1024x768x16 -ac +extension GLX +render -noreset
autorestart=true
priority=100

[program:x11vnc]
command=x11vnc -display :1 -listen 0.0.0.0 -forever -shared -passwd %(ENV_VNC_PASSWORD)s
autorestart=true
priority=200

[program:metatrader5]
command=wine "/config/.wine/drive_c/Program Files/MetaTrader 5/terminal64.exe" /config:C:/mt5/config.ini
environment=DISPLAY=:1,WINEPREFIX=/config/.wine
autorestart=true
priority=300
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopsignal=INT
stopwaitsecs=20