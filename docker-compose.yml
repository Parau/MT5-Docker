services:
  mt5-server:
    build:
      context: ./images/mt5-headless
      dockerfile: Dockerfile
    container_name: mt5_headless_container
    environment:
      - MT5_LOGIN=${MT5_LOGIN}
      - MT5_PASSWORD=${MT5_PASSWORD}
      - MT5_SERVER=${MT5_SERVER}
      - VNC_PASSWORD=${VNC_PASSWORD:?VNC_PASSWORD must be set}
    volumes:
      - mt5_persistent_data:/config/.wine
    ports:
      - "127.0.0.1:5901:5900"  # Porta do VNC para monitoramento visual
      - "127.0.0.1:5555:5555"  # Porta TCP para o seu feed de dados ZeroMQ

    # --- DAR TEMPO PARA O WINE FLUSH DE MEMÓRIA ---
    stop_grace_period: 30s
    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pgrep -f terminal64.exe >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
      
volumes:
  mt5_persistent_data: